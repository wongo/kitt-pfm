# render.yaml — KITT PFM Blueprint
# Auto-deploys FastAPI + Astro Web Site via Blueprint

services:
  # ── FastAPI Web Service ──────────────────────────────────────────
  - type: web
    name: kitt-pfm-api
    runtime: python
    region: oregon
    rootDir: pfm-web/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_MQnl4sK9NyPE@ep-jolly-shape-aq7e5ai7.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /api/health

  # ── Astro Web Site (served as Node app) ──────────────────────────
  - type: web
    name: kitt-pfm-web
    runtime: node
    region: oregon
    buildCommand: cd pfm-web && npm install && npm run build
    startCommand: cd pfm-web && npx serve dist -l $PORT
    envVars:
      - key: PUBLIC_API_URL
        value: https://kitt-pfm-api.onrender.com
      - key: NODE_VERSION
        value: "20"
