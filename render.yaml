# render.yaml — KITT PFM Blueprint
# Auto-deploys FastAPI + Astro Static Site via Blueprint

services:
  # ── FastAPI Web Service ──────────────────────────────────────────
  - type: web
    name: kitt-pfm-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd pfm-web/api && pip install -r requirements.txt
    startCommand: cd pfm-web/api && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kitt-pfm-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /api/health

  # ── Astro Static Site ───────────────────────────────────────────
  - type: web
    name: kitt-pfm-web
    runtime: static
    buildCommand: cd pfm-web && npm install && npm run build
    staticPublishPath: pfm-web/dist
    envVars:
      - key: PUBLIC_API_URL
        value: https://kitt-pfm-api.onrender.com
      - key: NODE_VERSION
        value: "20"
